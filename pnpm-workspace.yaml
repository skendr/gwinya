# pnpm 11 schema. The Next.js web app stays at the repo root (its own
# workspace package); the mobile Expo app and shared TS package are nested.
packages:
  - "apps/*"
  - "packages/*"

# Native-build scripts approved to run during install.
# - sharp: Next.js image optimisation binary
# - unrs-resolver: Rust-native resolver used by oxc/Turbopack
allowBuilds:
  esbuild: true
  sharp: true
  unrs-resolver: true
